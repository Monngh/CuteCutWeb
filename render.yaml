services:
  - type: web
    name: autocut-api
    plan: free
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: autocut-redis
          property: connectionString
      - key: FRONTEND_URL
        value: "https://your-vercel-domain.vercel.app"

  - type: redis
    name: autocut-redis
    plan: free
    ipAllowList: [] # Allow internal Render connections
